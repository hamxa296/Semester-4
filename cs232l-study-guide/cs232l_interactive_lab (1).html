<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS232L — Interactive Lab Tutor (Labs 7–11)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700;9..144,900&family=JetBrains+Mono:wght@400;500;700&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  /* DARK MODE — inverted warm theme */
  --bg: #0e0d0b;
  --bg-2: #161410;
  --paper: #14120f;          /* main background — deep warm black */
  --paper-2: #1c1a16;        /* slightly lifted panels */
  --ink: #ede4d3;            /* primary text — warm off-white */
  --ink-soft: rgba(237,228,211,0.7);
  --accent: #e89070;         /* slightly brighter for dark */
  --accent-2: #d97757;
  --gold: #e0b85f;
  --teal: #6dc0b0;
  --rose: #d47878;
  --line: rgba(237,228,211,0.1);
  --line-strong: rgba(237,228,211,0.18);
  --code-bg: #0a0907;        /* even darker than panels for code */
  --code-key: #e0b85f;
  --code-str: #9bcc8e;
  --code-num: #e89070;
  --code-com: #7d7770;
  --code-fn: #82bdd6;
  --shadow: 0 1px 2px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Inter Tight', system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.6;
  min-height: 100vh;
}

body {
  background-image:
    radial-gradient(at 20% 10%, rgba(232,144,112,0.08) 0%, transparent 50%),
    radial-gradient(at 80% 90%, rgba(109,192,176,0.06) 0%, transparent 50%),
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 38px,
      rgba(237,228,211,0.015) 38px,
      rgba(237,228,211,0.015) 39px
    );
}

/* ============ HEADER ============ */
header.masthead {
  border-bottom: 2px solid var(--ink);
  background: rgba(20,18,15,0.85);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}

.masthead-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 14px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
}

.brand {
  display: flex;
  align-items: baseline;
  gap: 14px;
}

.brand-mark {
  font-family: 'Fraunces', serif;
  font-weight: 900;
  font-size: 1.8rem;
  letter-spacing: -0.03em;
  line-height: 1;
}

.brand-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--ink-soft);
  border-left: 1px solid var(--line-strong);
  padding-left: 14px;
}

.brand-mark::before {
  content: "§";
  color: var(--accent);
  margin-right: 6px;
}

.progress-meter {
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
}

.progress-bar {
  width: 180px;
  height: 6px;
  background: rgba(237,228,211,0.1);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--gold));
  width: 0%;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ============ LAYOUT ============ */
.app {
  max-width: 1400px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 0;
  min-height: calc(100vh - 70px);
}

/* ============ SIDEBAR ============ */
.sidebar {
  border-right: 1px solid var(--line);
  padding: 32px 24px;
  position: sticky;
  top: 70px;
  height: calc(100vh - 70px);
  overflow-y: auto;
}

.sidebar h3 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--ink-soft);
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px dashed var(--line);
}

.lab-list {
  list-style: none;
  margin-bottom: 24px;
}

.lab-item {
  margin-bottom: 4px;
}

.lab-btn {
  width: 100%;
  text-align: left;
  background: transparent;
  border: none;
  padding: 10px 12px;
  font-family: 'Inter Tight', sans-serif;
  font-size: 0.92rem;
  cursor: pointer;
  border-radius: 6px;
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--ink);
  transition: all 0.2s;
  border-left: 2px solid transparent;
}

.lab-btn:hover {
  background: rgba(232,144,112,0.1);
}

.lab-btn.active {
  background: var(--ink);
  color: var(--paper);
  border-left-color: var(--accent);
}

.lab-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  opacity: 0.6;
  font-weight: 700;
}

.section-list {
  list-style: none;
  padding-left: 12px;
  margin-bottom: 12px;
  border-left: 1px dashed var(--line);
}

.section-list li {
  padding: 6px 10px;
  font-size: 0.82rem;
  color: var(--ink-soft);
  cursor: pointer;
  border-radius: 4px;
  margin: 2px 0;
}

.section-list li:hover {
  color: var(--accent);
}

.section-list li.active {
  color: var(--accent);
  font-weight: 600;
}

.section-list li.done::before {
  content: "✓ ";
  color: var(--teal);
  font-weight: 700;
}

/* ============ MAIN ============ */
main.content {
  padding: 48px 56px;
  max-width: 1000px;
}

.lab-header {
  margin-bottom: 40px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--line);
}

.lab-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: var(--accent);
  margin-bottom: 12px;
  display: inline-block;
  background: rgba(232,144,112,0.12);
  padding: 4px 10px;
  border-radius: 3px;
}

.lab-title {
  font-family: 'Fraunces', serif;
  font-size: 3.2rem;
  font-weight: 900;
  line-height: 0.95;
  letter-spacing: -0.04em;
  margin-bottom: 12px;
}

.lab-title em {
  font-style: italic;
  color: var(--accent);
}

.lab-intro {
  font-size: 1.05rem;
  color: var(--ink-soft);
  max-width: 640px;
  font-family: 'Fraunces', serif;
  font-weight: 400;
}

/* ============ SECTIONS ============ */
.section {
  margin-bottom: 56px;
  scroll-margin-top: 100px;
}

.section-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--accent);
  letter-spacing: 0.15em;
  margin-bottom: 6px;
}

.section h2 {
  font-family: 'Fraunces', serif;
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin-bottom: 16px;
  line-height: 1.1;
}

.section h3 {
  font-family: 'Fraunces', serif;
  font-size: 1.35rem;
  font-weight: 600;
  margin-top: 28px;
  margin-bottom: 10px;
}

.section h4 {
  font-family: 'Inter Tight', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  margin-top: 20px;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--ink-soft);
}

.section p {
  margin-bottom: 14px;
  max-width: 70ch;
}

.section ul, .section ol {
  margin: 12px 0 16px 22px;
  max-width: 68ch;
}

.section li {
  margin-bottom: 6px;
}

strong { font-weight: 700; }
em { font-style: italic; }

code.inline {
  font-family: 'JetBrains Mono', monospace;
  background: rgba(237,228,211,0.08);
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 0.88em;
  color: var(--accent);
}

/* ============ CALLOUTS ============ */
.callout {
  border-left: 3px solid var(--accent);
  background: rgba(232,144,112,0.08);
  padding: 16px 20px;
  margin: 20px 0;
  border-radius: 0 6px 6px 0;
}

.callout.tip { border-color: var(--teal); background: rgba(109,192,176,0.08); }
.callout.warn { border-color: var(--rose); background: rgba(212,120,120,0.08); }
.callout.note { border-color: var(--gold); background: rgba(224,184,95,0.08); }

.callout-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  font-weight: 700;
  margin-bottom: 6px;
  display: block;
}

.callout.tip .callout-label { color: var(--teal); }
.callout.warn .callout-label { color: var(--rose); }
.callout.note .callout-label { color: var(--gold); }
.callout .callout-label { color: var(--accent); }

/* ============ CODE BLOCKS ============ */
.code-block {
  background: var(--code-bg);
  color: #ede4d3;
  border-radius: 8px;
  margin: 16px 0;
  overflow: hidden;
  box-shadow: var(--shadow);
  border: 1px solid var(--line-strong);
}

.code-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: rgba(255,255,255,0.04);
  padding: 8px 14px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: rgba(237,228,211,0.55);
  border-bottom: 1px solid rgba(237,228,211,0.08);
}

.copy-btn {
  background: transparent;
  border: 1px solid rgba(237,228,211,0.2);
  color: rgba(237,228,211,0.65);
  padding: 3px 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  border-radius: 4px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  transition: all 0.2s;
}

.copy-btn:hover {
  background: rgba(237,228,211,0.1);
  color: var(--ink);
}

.copy-btn.copied {
  background: var(--teal);
  color: var(--code-bg);
  border-color: var(--teal);
}

.code-block pre {
  padding: 16px 20px;
  overflow-x: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.86rem;
  line-height: 1.6;
}

.k { color: var(--code-key); font-weight: 500; }
.s { color: var(--code-str); }
.n { color: var(--code-num); }
.c { color: var(--code-com); font-style: italic; }
.f { color: var(--code-fn); }
.t { color: #d4a4d4; }

/* ============ INTERACTIVE PLAYGROUND ============ */
.playground {
  border: 1px solid var(--line-strong);
  border-radius: 10px;
  margin: 24px 0;
  background: var(--paper-2);
  overflow: hidden;
}

.playground-header {
  background: #0a0907;
  color: var(--ink);
  padding: 12px 18px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--line-strong);
}

.playground-header::before {
  content: "▶ ";
  color: var(--accent);
}

.playground-body {
  padding: 18px;
}

.playground-controls {
  display: flex;
  gap: 12px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.control-group {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.control-group label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-soft);
}

.control-group input,
.control-group select {
  font-family: 'JetBrains Mono', monospace;
  padding: 6px 10px;
  border: 1px solid var(--line-strong);
  border-radius: 4px;
  background: var(--code-bg);
  font-size: 0.88rem;
  color: var(--ink);
}

.control-group input:focus,
.control-group select:focus {
  outline: 2px solid var(--accent);
  outline-offset: -1px;
}

.run-btn {
  background: var(--accent);
  color: var(--code-bg);
  border: none;
  padding: 8px 18px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  cursor: pointer;
  border-radius: 4px;
  font-weight: 700;
  transition: all 0.2s;
  align-self: flex-end;
}

.run-btn:hover {
  background: var(--gold);
  transform: translateY(-1px);
}

.output-display {
  background: var(--code-bg);
  color: #ede4d3;
  padding: 14px 18px;
  border-radius: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  min-height: 60px;
  margin-top: 12px;
  white-space: pre-wrap;
  line-height: 1.6;
  border: 1px solid var(--line);
}

.output-display .notice { color: var(--gold); font-weight: 600; }
.output-display .err { color: var(--rose); }
.output-display .ok { color: var(--teal); }
.output-display .row { color: #b8d4c8; }
.output-display .c { color: var(--code-com); font-style: italic; }

/* ============ QUIZ ============ */
.quiz {
  border: 1px solid var(--line-strong);
  border-radius: 10px;
  padding: 24px;
  margin: 28px 0;
  background: var(--paper-2);
  position: relative;
}

.quiz::before {
  content: "Q";
  position: absolute;
  top: -16px;
  left: 24px;
  width: 32px;
  height: 32px;
  background: var(--accent);
  color: var(--code-bg);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Fraunces', serif;
  font-weight: 900;
  font-size: 1rem;
  box-shadow: 0 0 0 4px var(--paper);
}

.quiz-question {
  font-family: 'Fraunces', serif;
  font-size: 1.15rem;
  font-weight: 600;
  margin-bottom: 14px;
  margin-top: 4px;
}

.quiz-options {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.quiz-option {
  padding: 10px 14px;
  border: 1px solid var(--line-strong);
  border-radius: 6px;
  cursor: pointer;
  background: var(--code-bg);
  transition: all 0.2s;
  font-family: 'Inter Tight', sans-serif;
  font-size: 0.95rem;
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--ink);
}

.quiz-option::before {
  content: "○";
  color: var(--ink-soft);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
}

.quiz-option:hover {
  border-color: var(--accent);
  background: rgba(232,144,112,0.08);
}

.quiz-option.correct {
  background: rgba(109,192,176,0.15);
  border-color: var(--teal);
}

.quiz-option.correct::before {
  content: "✓";
  color: var(--teal);
}

.quiz-option.wrong {
  background: rgba(212,120,120,0.12);
  border-color: var(--rose);
}

.quiz-option.wrong::before {
  content: "✗";
  color: var(--rose);
}

.quiz-feedback {
  margin-top: 14px;
  padding: 12px 16px;
  border-radius: 6px;
  font-size: 0.92rem;
  display: none;
}

.quiz-feedback.show { display: block; }
.quiz-feedback.right { background: rgba(109,192,176,0.12); color: var(--teal); border-left: 3px solid var(--teal); }
.quiz-feedback.miss { background: rgba(212,120,120,0.1); color: var(--rose); border-left: 3px solid var(--rose); }

/* ============ DIAGRAM ============ */
.diagram {
  background: var(--paper-2);
  border: 1px solid var(--line-strong);
  border-radius: 10px;
  padding: 28px;
  margin: 24px 0;
  text-align: center;
}

.diagram svg {
  max-width: 100%;
  height: auto;
}

.diagram-caption {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--ink-soft);
  margin-top: 14px;
}

/* ============ TABLE ============ */
table.cmp {
  width: 100%;
  border-collapse: collapse;
  margin: 18px 0;
  font-size: 0.92rem;
  background: var(--paper);
  border-radius: 8px;
  overflow: hidden;
  box-shadow: var(--shadow);
}

table.cmp th {
  background: var(--ink);
  color: var(--paper);
  padding: 12px 14px;
  text-align: left;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

table.cmp td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  vertical-align: top;
}

table.cmp tr:last-child td { border-bottom: none; }
table.cmp tr:hover { background: rgba(217,119,87,0.04); }

/* ============ SIMULATOR (PSQL terminal style) ============ */
.psql-sim {
  background: var(--code-bg);
  border-radius: 8px;
  padding: 18px;
  margin: 20px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85rem;
  min-height: 200px;
  color: #d4d4d0;
  box-shadow: var(--shadow);
}

.psql-prompt {
  color: var(--code-fn);
}

.psql-input-line {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
}

.psql-input-line input {
  flex: 1;
  background: transparent;
  border: none;
  color: #e8e2d4;
  font-family: inherit;
  font-size: inherit;
  outline: none;
}

/* ============ FOOTER ============ */
footer.colophon {
  border-top: 1px solid var(--line);
  padding: 32px;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: rgba(26,24,20,0.5);
  letter-spacing: 0.1em;
}

/* ============ FLOWCHART ============ */
.flow-chart {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.flow-node {
  background: var(--paper);
  border: 2px solid var(--ink);
  border-radius: 8px;
  padding: 12px 18px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.flow-node.decision {
  border-radius: 50%;
  background: var(--gold);
  color: var(--ink);
  padding: 18px 14px;
  font-size: 0.72rem;
}

.flow-arrow {
  font-size: 1.6rem;
  color: var(--accent);
}

/* ============ COMPLETION BANNER ============ */
.completion {
  text-align: center;
  padding: 40px;
  margin-top: 40px;
  background: linear-gradient(135deg, rgba(217,119,87,0.08), rgba(212,168,73,0.06));
  border: 1px dashed var(--accent);
  border-radius: 12px;
}

.completion h3 {
  font-family: 'Fraunces', serif;
  font-size: 1.8rem;
  margin-bottom: 8px;
}

.next-btn {
  background: var(--ink);
  color: var(--paper);
  border: none;
  padding: 12px 26px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  cursor: pointer;
  border-radius: 6px;
  margin-top: 16px;
  transition: all 0.2s;
}

.next-btn:hover {
  background: var(--accent);
  transform: translateY(-2px);
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { position: relative; height: auto; top: 0; border-right: none; border-bottom: 1px solid var(--line); }
  main.content { padding: 32px 24px; }
  .lab-title { font-size: 2.2rem; }
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(26,24,20,0.2); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(26,24,20,0.35); }

/* ANIMATIONS */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.section { animation: fadeIn 0.5s ease-out; }

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

.notice-pulse { animation: pulse 0.6s ease-out; }

/* MARQUEE for hero */
.term-line {
  font-family: 'JetBrains Mono', monospace;
  color: rgba(26,24,20,0.5);
  font-size: 0.75rem;
  margin-bottom: 4px;
}

.term-line::before { content: "▸ "; color: var(--accent); }

.objectives {
  background: var(--paper-2);
  padding: 20px 24px;
  border-radius: 8px;
  border-left: 3px solid var(--gold);
  margin-bottom: 32px;
}

.objectives h4 {
  margin-top: 0 !important;
  color: var(--ink) !important;
}
</style>
</head>
<body>

        html: `
          <p>Plain SQL is <strong>declarative</strong>: you describe <em>what</em> you want ("give me all films longer than 2 hours") and the database figures out how. That's powerful, but it's missing something — you can't easily say "if X happened, then do Y, otherwise do Z." There's no concept of "do this 100 times." Plain SQL has no IF, no loops, no variables you can store and update.</p>

          <p>PL/pgSQL fills that gap. It's a <strong>procedural</strong> language that runs <em>inside</em> the database. Same machine, same connection — no round-trips to your app server. You can:</p>

          <ul>
            <li>Declare variables and assign values to them</li>

            <span class="callout-label">Why this matters</span>
            <p style="margin: 0;">PL/pgSQL is the foundation for everything in the next three labs: stored procedures, functions, and triggers all live inside <code class="inline">DO $$ ... $$</code> blocks. Master the basics here and the rest comes easily.</p>

        id: 'anatomy',
        num: '02',
        title: 'Anatomy of a PL/pgSQL block',
        html: `
          <p>Every PL/pgSQL program follows the same skeleton. Memorise this — you'll write it dozens of times this semester.</p>

          <div class="code-block">
            <div class="code-header"><span>The PL/pgSQL Block Template</span><button class="copy-btn">Copy</button></div>
<pre><span class="k">DO</span> $$
<span class="k">DECLARE</span>
   <span class="c">-- variable declarations go here</span>
   counter <span class="t">integer</span> := <span class="n">0</span>;
   message <span class="t">varchar</span>(<span class="n">100</span>);
<span class="k">BEGIN</span>
   <span class="c">-- your actual logic goes here</span>
   counter := counter + <span class="n">1</span>;
   <span class="k">RAISE NOTICE</span> <span class="s">'Counter is %'</span>, counter;
<span class="k">END</span> $$;</pre>
          </div>

          <h4>What each part does</h4>

          <ul>
            <li><strong><code class="inline">DO</code></strong> — tells PostgreSQL "execute this anonymous block right now." Introduced in PostgreSQL 9.0. "Anonymous" means it doesn't have a name — it runs once and disappears.</li>
            <li><strong><code class="inline">$$ ... $$</code></strong> — dollar-quoted string. Everything between the dollar signs is treated as one giant string of code. Why? Because the block contains single quotes (in strings), and using regular quotes would be a nightmare to escape. Dollar quoting is a PostgreSQL convenience that makes blocks readable.</li>
            <li><strong><code class="inline">DECLARE</code></strong> — optional section where you list every variable you'll use, with its type. If you don't need variables, you can skip <code class="inline">DECLARE</code> entirely.</li>
            <li><strong><code class="inline">BEGIN ... END</code></strong> — the body. This is where your actual logic lives.</li>
            <li><strong><code class="inline">:=</code></strong> — the assignment operator. <code class="inline">counter := 5</code> means "set counter to 5." Don't confuse it with <code class="inline">=</code>, which in SQL is for comparison.</li>
          </ul>

          <div class="callout warn">
            <span class="callout-label">Common mistake</span>
            <p style="margin: 0;">Forgetting the semicolons. Every statement inside <code class="inline">BEGIN ... END</code> needs to end with <code class="inline">;</code>. The block itself ends with <code class="inline">END $$;</code> — note the semicolon after the closing dollars.</p>
          </div>
        `

          <p>Let's run the canonical first-block example: count the rows in a table and display the result. We'll use the <code class="inline">film</code> table from the dvdrental sample database (the one your course is built around).</p>

          <div class="code-block">
            <div class="code-header"><span>first_block.sql</span><button class="copy-btn">Copy</button></div>
<pre><span class="k">DO</span> $$
&lt;&lt;first_block&gt;&gt;
<span class="k">DECLARE</span>
   film_count <span class="t">integer</span> := <span class="n">0</span>;
<span class="k">BEGIN</span>
   <span class="c">-- get the number of films</span>
   <span class="k">SELECT COUNT</span>(*)
   <span class="k">INTO</span> film_count
   <span class="k">FROM</span> film;

   <span class="c">-- display a message</span>
   <span class="k">RAISE NOTICE</span> <span class="s">'The number of films is %'</span>, film_count;
<span class="k">END</span> first_block $$;</pre>

          <p>Three new things to notice:</p>

            <li><strong><code class="inline">SELECT ... INTO variable</code></strong> — runs a query and stores the result in a variable instead of returning it to the caller. This only works for queries that return exactly one row.</li>
            <li><strong><code class="inline">RAISE NOTICE</code></strong> — prints a message in the "Messages" tab of pgAdmin. The <code class="inline">%</code> is a placeholder that gets replaced by the variable that follows.</li>

        id: 'ifelse',
        num: '04',
        title: 'IF / ELSIF / ELSE — branching logic',
        html: `
          <p>Decisions. The bread and butter of every program. PL/pgSQL gives you three flavors.</p>

          <h3>Form 1: IF / END IF (simplest)</h3>
          <p>Used when you only want to do something <em>if</em> a condition is true, otherwise do nothing.</p>

          <div class="code-block">
            <div class="code-header"><span>Pattern</span></div>
<pre><span class="k">IF</span> condition <span class="k">THEN</span>
   statements;
<span class="k">END IF</span>;</pre>
          </div>

          <h3>Form 2: IF / ELSE / END IF</h3>
          <p>Two paths: either the condition is true, or it isn't.</p>

          <div class="code-block">
            <div class="code-header"><span>Example — Find a film by ID</span><button class="copy-btn">Copy</button></div>
<pre><span class="k">DO</span> $$
<span class="k">DECLARE</span>
   selected_film film%<span class="t">ROWTYPE</span>;
   input_film_id film.film_id%<span class="t">TYPE</span> := <span class="n">100</span>;
<span class="k">BEGIN</span>
   <span class="k">SELECT</span> * <span class="k">FROM</span> film
   <span class="k">INTO</span> selected_film
   <span class="k">WHERE</span> film_id = input_film_id;

   <span class="k">IF NOT FOUND THEN</span>
      <span class="k">RAISE NOTICE</span> <span class="s">'The film % could not be found'</span>, input_film_id;
   <span class="k">ELSE</span>
      <span class="k">RAISE NOTICE</span> <span class="s">'The film title is %'</span>, selected_film.title;
   <span class="k">END IF</span>;
<span class="k">END</span> $$;</pre>
          </div>

          <p>Two new PL/pgSQL idioms here that you'll see constantly:</p>

          <ul>
            <li><code class="inline">film%ROWTYPE</code> — declares a variable that can hold an <em>entire row</em> from the film table. You don't have to list all the columns; PostgreSQL figures it out.</li>
            <li><code class="inline">film.film_id%TYPE</code> — declares a variable with the <em>same data type</em> as the <code class="inline">film_id</code> column. If the table schema later changes (say, from integer to bigint), your code keeps working.</li>
            <li><code class="inline">FOUND</code> — a special built-in boolean. After a <code class="inline">SELECT INTO</code>, <code class="inline">FOUND</code> is true if a row was found, false otherwise.</li>
          </ul>

          <h3>Form 3: IF / ELSIF / ELSE / END IF</h3>
          <p>Multi-way branch. Test several conditions in order; first one that's true wins.</p>

          <div class="code-block">
            <div class="code-header"><span>Example — Classify a film by length</span><button class="copy-btn">Copy</button></div>
<pre><span class="k">DO</span> $$
<span class="k">DECLARE</span>
   v_film film%<span class="t">ROWTYPE</span>;
   len_description <span class="t">varchar</span>(<span class="n">100</span>);
<span class="k">BEGIN</span>
   <span class="k">SELECT</span> * <span class="k">FROM</span> film <span class="k">INTO</span> v_film <span class="k">WHERE</span> film_id = <span class="n">100</span>;

   <span class="k">IF NOT FOUND THEN</span>
      <span class="k">RAISE NOTICE</span> <span class="s">'Film not found'</span>;
   <span class="k">ELSE</span>
      <span class="k">IF</span> v_film.length &gt; <span class="n">0</span> <span class="k">AND</span> v_film.length &lt;= <span class="n">50</span> <span class="k">THEN</span>
         len_description := <span class="s">'Short'</span>;
      <span class="k">ELSIF</span> v_film.length &gt; <span class="n">50</span> <span class="k">AND</span> v_film.length &lt; <span class="n">120</span> <span class="k">THEN</span>
         len_description := <span class="s">'Medium'</span>;
      <span class="k">ELSIF</span> v_film.length &gt;= <span class="n">120</span> <span class="k">THEN</span>
         len_description := <span class="s">'Long'</span>;
      <span class="k">ELSE</span>
         len_description := <span class="s">'N/A'</span>;
      <span class="k">END IF</span>;

      <span class="k">RAISE NOTICE</span> <span class="s">'The % film is %.'</span>, v_film.title, len_description;
   <span class="k">END IF</span>;
<span class="k">END</span> $$;</pre>
          </div>

          <div class="callout note">
            <span class="callout-label">Spelling matters</span>
            <p style="margin: 0;">It's <code class="inline">ELSIF</code>, not <code class="inline">ELSE IF</code> or <code class="inline">ELIF</code>. Forget this and PostgreSQL will give you a confusing syntax error.</p>
          </div>

          <div class="playground">
            <div class="playground-header"><span>Film length classifier</span></div>
            <div class="playground-body">
              <p style="margin: 0 0 12px 0; font-size: 0.9rem;">Enter a length in minutes and see how the ELSIF chain classifies it.</p>

                </div>
                <button class="run-btn" onclick="runSim2()">Run Block</button>
              </div>

            </div>
          </div>

            <div class="quiz-question">A film has length = 50. Using the ELSIF chain above, what description does it get?</div>

              <li class="quiz-option" data-idx="3">N/A</li>
            </ul>
            <div class="quiz-feedback"></div>
          </div>

          <p style="font-size: 0.85rem; color: rgba(26,24,20,0.6);">(Look carefully at the conditions — boundary values catch people out.)</p>
        `

      {
        id: 'case',
        num: '05',
        title: 'CASE — the cleaner alternative',
        html: `
          <p>When you have lots of branches based on a single value, <code class="inline">IF/ELSIF</code> becomes ugly. <code class="inline">CASE</code> is cleaner.</p>

          <p>Two flavors: <strong>simple CASE</strong> (compare one expression against multiple values) and <strong>searched CASE</strong> (a fresh boolean condition for each branch).</p>

          <h3>Simple CASE</h3>
          <div class="code-block">
            <div class="code-header"><span>Example — Price segment by rental rate</span></div>
<pre><span class="k">DO</span> $$
<span class="k">DECLARE</span>
   rate film.rental_rate%<span class="t">TYPE</span>;
   price_segment <span class="t">varchar</span>(<span class="n">50</span>);
<span class="k">BEGIN</span>
   <span class="k">SELECT</span> rental_rate <span class="k">INTO</span> rate
   <span class="k">FROM</span> film
   <span class="k">WHERE</span> film_id = <span class="n">100</span>;

   <span class="k">IF FOUND THEN</span>
      <span class="k">CASE</span> rate
         <span class="k">WHEN</span> <span class="n">0.99</span> <span class="k">THEN</span>
            price_segment := <span class="s">'Mass'</span>;
         <span class="k">WHEN</span> <span class="n">2.99</span> <span class="k">THEN</span>
            price_segment := <span class="s">'Mainstream'</span>;
         <span class="k">WHEN</span> <span class="n">4.99</span> <span class="k">THEN</span>
            price_segment := <span class="s">'High End'</span>;
         <span class="k">ELSE</span>
            price_segment := <span class="s">'Unspecified'</span>;
      <span class="k">END CASE</span>;

      <span class="k">RAISE NOTICE</span> <span class="s">'%'</span>, price_segment;
   <span class="k">END IF</span>;
<span class="k">END</span> $$;</pre>
          </div>

          <p>How simple CASE works: PostgreSQL compares <code class="inline">rate</code> against each WHEN value using <code class="inline">=</code>, top to bottom. First match wins. If nothing matches and there's no ELSE, you get a <code class="inline">case_not_found</code> exception — so always include ELSE unless you're sure all cases are covered.</p>

          <h3>Searched CASE</h3>
          <p>Each branch has its own boolean expression. Use this when you're testing different things (not the same value).</p>

          <div class="code-block">
            <div class="code-header"><span>Example — Service level by total payment</span></div>
<pre><span class="k">DO</span> $$
<span class="k">DECLARE</span>
   total_payment <span class="t">numeric</span>;
   service_level <span class="t">varchar</span>(<span class="n">25</span>);
<span class="k">BEGIN</span>
   <span class="k">SELECT SUM</span>(amount) <span class="k">INTO</span> total_payment
   <span class="k">FROM</span> payment
   <span class="k">WHERE</span> customer_id = <span class="n">100</span>;

   <span class="k">IF FOUND THEN</span>
      <span class="k">CASE</span>
         <span class="k">WHEN</span> total_payment &gt; <span class="n">200</span> <span class="k">THEN</span>
            service_level := <span class="s">'Platinum'</span>;
         <span class="k">WHEN</span> total_payment &gt; <span class="n">100</span> <span class="k">THEN</span>
            service_level := <span class="s">'Gold'</span>;
         <span class="k">ELSE</span>
            service_level := <span class="s">'Silver'</span>;
      <span class="k">END CASE</span>;

      <span class="k">RAISE NOTICE</span> <span class="s">'Service Level: %'</span>, service_level;
   <span class="k">ELSE</span>
      <span class="k">RAISE NOTICE</span> <span class="s">'Customer not found'</span>;
   <span class="k">END IF</span>;
<span class="k">END</span> $$;</pre>
          </div>

          <div class="callout">
            <span class="callout-label">The "first match" trap</span>
            <p style="margin: 0;">In the example above, a customer with $250 total would hit the <code class="inline">&gt; 200</code> branch and stop. The <code class="inline">&gt; 100</code> branch would also be true, but CASE never reaches it — order matters. Put the most specific conditions first.</p>
          </div>

          <div class="playground">
            <div class="playground-header"><span>Service-level classifier</span></div>
            <div class="playground-body">
              <div class="playground-controls">
                <div class="control-group">
                  <label>Total payment ($)</label>

                </div>
                <button class="run-btn" onclick="runSim3()">Classify</button>
              </div>
              <div class="output-display" id="sim3_out">Output appears here.</div>
            </div>
          </div>
        `

        id: 'loops',
        num: '06',
        title: 'WHILE loops — pretest iteration',
        html: `
          <p>Loops let you repeat a block of code. WHILE is the simplest: it checks a condition, runs the body if true, then checks again. It's a <strong>pretest loop</strong>, meaning if the condition starts false, the body never runs.</p>

          <div class="code-block">
            <div class="code-header"><span>WHILE syntax</span></div>
<pre>[ &lt;&lt;label&gt;&gt; ]
<span class="k">WHILE</span> condition <span class="k">LOOP</span>
   statements;
<span class="k">END LOOP</span>;</pre>
          </div>

          <div class="code-block">
            <div class="code-header"><span>Example — Counter from 0 to 4</span><button class="copy-btn">Copy</button></div>
<pre><span class="k">DO</span> $$
<span class="k">DECLARE</span>
   counter <span class="t">integer</span> := <span class="n">0</span>;
<span class="k">BEGIN</span>
   <span class="k">WHILE</span> counter &lt; <span class="n">5</span> <span class="k">LOOP</span>
      <span class="k">RAISE NOTICE</span> <span class="s">'Counter %'</span>, counter;
      counter := counter + <span class="n">1</span>;
   <span class="k">END LOOP</span>;
<span class="k">END</span> $$;</pre>
          </div>

          <p>Output:</p>
          <div class="code-block">
<pre><span class="c">NOTICE:  Counter 0
NOTICE:  Counter 1
NOTICE:  Counter 2
NOTICE:  Counter 3
NOTICE:  Counter 4</span></pre>
          </div>

          <div class="callout warn">
            <span class="callout-label">Infinite loop danger</span>
            <p style="margin: 0;">If you forget <code class="inline">counter := counter + 1</code>, the condition <code class="inline">counter &lt; 5</code> stays true forever. PostgreSQL will spin until you kill it. Always make sure something in the body changes the condition variable.</p>
          </div>

          <div class="playground">
            <div class="playground-header"><span>WHILE loop runner</span></div>
            <div class="playground-body">

            </div>

        `

          <div class="quiz" data-correct="2">
            <div class="quiz-question">Which is the correct way to declare a variable that has the same type as the <code class="inline">customer.email</code> column?</div>
            <ul class="quiz-options">

          <div class="quiz" data-correct="0">

    tag: 'Lab 08 · PL/pgSQL — Reusable Logic',
    intro: 'Anonymous DO blocks run once and vanish. To save and reuse your logic, you wrap it in a function or procedure. Cursors let you process huge result sets one row at a time without blowing up memory.',

        title: 'Cursors — processing one row at a time',
        html: `
          <p>Imagine you have a table with 10 million rows. You run <code class="inline">SELECT * FROM huge_table</code> in PL/pgSQL and try to store the result in a variable. PostgreSQL has to materialise all 10 million rows in memory first. Your server runs out of RAM. The query dies.</p>

          <p>A <strong>cursor</strong> is the fix. It's a pointer into a result set that lets you fetch rows <em>one at a time</em> (or in small batches). Memory usage stays constant regardless of how big the result is.</p>

          <div class="diagram">
            <svg viewBox="0 0 700 140" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <marker id="arrow1" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                  <polygon points="0 0, 10 3, 0 6" fill="#e89070"/>
                </marker>
              </defs>
              <g font-family="JetBrains Mono, monospace" font-size="11" font-weight="700">
                <rect x="10" y="50" width="100" height="40" rx="6" fill="#1c1a16" stroke="#ede4d3" stroke-width="2"/>
                <text x="60" y="74" text-anchor="middle" fill="#ede4d3">DECLARE</text>

                <rect x="140" y="50" width="100" height="40" rx="6" fill="#1c1a16" stroke="#ede4d3" stroke-width="2"/>
                <text x="190" y="74" text-anchor="middle" fill="#ede4d3">OPEN</text>

                <rect x="270" y="50" width="100" height="40" rx="6" fill="#1c1a16" stroke="#ede4d3" stroke-width="2"/>
                <text x="320" y="74" text-anchor="middle" fill="#ede4d3">FETCH</text>

                <polygon points="400,50 470,70 400,90 380,70" fill="#e0b85f" stroke="#0a0907" stroke-width="2"/>
                <text x="425" y="74" text-anchor="middle" fill="#0a0907" font-size="9">EMPTY?</text>

                <rect x="500" y="50" width="100" height="40" rx="6" fill="#1c1a16" stroke="#ede4d3" stroke-width="2"/>
                <text x="550" y="74" text-anchor="middle" fill="#ede4d3">CLOSE</text>

                <line x1="110" y1="70" x2="140" y2="70" stroke="#e89070" stroke-width="2" marker-end="url(#arrow1)"/>
                <line x1="240" y1="70" x2="270" y2="70" stroke="#e89070" stroke-width="2" marker-end="url(#arrow1)"/>
                <line x1="370" y1="70" x2="380" y2="70" stroke="#e89070" stroke-width="2" marker-end="url(#arrow1)"/>
                <line x1="470" y1="70" x2="500" y2="70" stroke="#e89070" stroke-width="2" marker-end="url(#arrow1)"/>

                <path d="M 425 50 Q 425 20 320 20 L 320 50" stroke="#e89070" stroke-width="2" fill="none" marker-end="url(#arrow1)"/>
                <text x="370" y="14" fill="#ede4d3" font-size="9">NO</text>
                <text x="478" y="46" fill="#ede4d3" font-size="9">YES</text>
              </g>
            </svg>
            <div class="diagram-caption">Cursor lifecycle — declare, open, loop fetch+process until empty, close</div>
          </div>

          <h4>The 5 steps</h4>
          <ol>
            <li><strong>Declare</strong> a cursor variable (special type: <code class="inline">refcursor</code>) or bind it directly to a query.</li>
            <li><strong>Open</strong> the cursor — this executes the query but doesn't return rows yet.</li>
            <li><strong>Fetch</strong> the next row into variables you've declared.</li>
            <li>Check if a row was actually fetched (<code class="inline">FOUND</code>). If not, exit the loop.</li>
            <li><strong>Close</strong> the cursor to free resources.</li>
          </ol>

          <div class="code-block">
            <div class="code-header"><span>Cursor example — print every film title</span></div>
<pre><span class="k">DO</span> $$
<span class="k">DECLARE</span>
   film_cursor <span class="k">CURSOR FOR SELECT</span> title <span class="k">FROM</span> film;
   v_title film.title%<span class="t">TYPE</span>;
<span class="k">BEGIN</span>
   <span class="k">OPEN</span> film_cursor;
   <span class="k">LOOP</span>
      <span class="k">FETCH</span> film_cursor <span class="k">INTO</span> v_title;
      <span class="k">EXIT WHEN NOT FOUND</span>;
      <span class="k">RAISE NOTICE</span> <span class="s">'Film: %'</span>, v_title;
   <span class="k">END LOOP</span>;
   <span class="k">CLOSE</span> film_cursor;
<span class="k">END</span> $$;</pre>
          </div>

          <div class="callout tip">
            <span class="callout-label">When to skip cursors</span>
            <p style="margin: 0;">For most everyday tasks, a <code class="inline">FOR row IN SELECT ... LOOP</code> is simpler and PostgreSQL uses a cursor under the hood. Reach for explicit cursors only when you need their fine-grained control (passing cursor references between functions, scrolling backwards, etc.).</p>

        title: 'Functions — named, reusable, return a value',
        html: `
          <p>A function is a named PL/pgSQL block stored in the database. You write it once, then call it like any built-in: <code class="inline">SELECT my_function(args)</code>. Functions <strong>return a value</strong> — that's what distinguishes them from procedures.</p>

          <h3>Anatomy of a function</h3>

          <div class="code-block">
            <div class="code-header"><span>get_film_count.sql</span><button class="copy-btn">Copy</button></div>
<pre><span class="k">CREATE FUNCTION</span> get_film_count(len_from <span class="t">int</span>, len_to <span class="t">int</span>)
<span class="k">RETURNS</span> <span class="t">int</span>
<span class="k">LANGUAGE</span> plpgsql
<span class="k">AS</span> $$
<span class="k">DECLARE</span>
   film_count <span class="t">integer</span>;
<span class="k">BEGIN</span>
   <span class="k">SELECT COUNT</span>(*)
   <span class="k">INTO</span> film_count
   <span class="k">FROM</span> film
   <span class="k">WHERE</span> length <span class="k">BETWEEN</span> len_from <span class="k">AND</span> len_to;

   <span class="k">RETURN</span> film_count;
<span class="k">END</span>;
$$;</pre>
          </div>

          <p>Walk through every line:</p>

          <ul>
            <li><code class="inline">CREATE FUNCTION get_film_count</code> — saves it under this name. Add <code class="inline">OR REPLACE</code> if you want to overwrite an existing one (handy during development).</li>
            <li><code class="inline">(len_from int, len_to int)</code> — the parameter list. Two integers in.</li>
            <li><code class="inline">RETURNS int</code> — this function gives back one integer.</li>
            <li><code class="inline">LANGUAGE plpgsql</code> — tells PostgreSQL the body is in PL/pgSQL (you could also write functions in plain SQL, Python, etc.).</li>
            <li><code class="inline">AS $$ ... $$</code> — the body, dollar-quoted as before.</li>
            <li><code class="inline">RETURN film_count;</code> — sends the result back to whoever called this function.</li>
          </ul>

          <h3>Three ways to call it</h3>

          <div class="code-block">
            <div class="code-header"><span>1. Positional notation (order matters)</span></div>
<pre><span class="k">SELECT</span> get_film_count(<span class="n">40</span>, <span class="n">90</span>);
<span class="c">-- result: 325</span></pre>
          </div>

          <div class="code-block">
            <div class="code-header"><span>2. Named notation (explicit, clearer)</span></div>
<pre><span class="k">SELECT</span> get_film_count(
   len_from =&gt; <span class="n">40</span>,
   len_to =&gt; <span class="n">90</span>
);</pre>
          </div>

          <div class="code-block">
            <div class="code-header"><span>3. Mixed notation (positional first, then named)</span></div>
<pre><span class="k">SELECT</span> get_film_count(<span class="n">40</span>, len_to =&gt; <span class="n">90</span>);

<span class="c">-- This errors: named before positional is forbidden</span>
<span class="k">SELECT</span> get_film_count(len_from =&gt; <span class="n">40</span>, <span class="n">90</span>);
<span class="c">-- ERROR: positional argument cannot follow named argument</span></pre>
          </div>

          <p>Use positional for short parameter lists (2–3 args). Use named when there are many parameters or when the call site would otherwise be unreadable.</p>

        `

        html: `
          <p>Procedures were added in PostgreSQL 11. They look almost identical to functions, but:</p>

          <ul>
            <li>They <strong>do not return a value</strong> (no <code class="inline">RETURNS</code> clause)</li>
            <li>They can <strong>manage their own transactions</strong> (use <code class="inline">COMMIT</code> and <code class="inline">ROLLBACK</code> inside them — functions can't)</li>
            <li>You call them with <code class="inline">CALL</code>, not <code class="inline">SELECT</code></li>
            <li>Parameters can be <code class="inline">IN</code> (input) or <code class="inline">INOUT</code> (input/output) — but not <code class="inline">OUT</code></li>
          </ul>

          <h3>Setting up the accounts table</h3>

          <div class="code-block">
            <div class="code-header"><span>Setup</span><button class="copy-btn">Copy</button></div>
<pre><span class="k">DROP TABLE IF EXISTS</span> accounts;

<span class="k">CREATE TABLE</span> accounts (
   id <span class="t">int GENERATED BY DEFAULT AS IDENTITY</span>,
   name <span class="t">varchar</span>(<span class="n">100</span>) <span class="k">NOT NULL</span>,
   balance <span class="t">dec</span>(<span class="n">15</span>,<span class="n">2</span>) <span class="k">NOT NULL</span>,
   <span class="k">PRIMARY KEY</span>(id)
);

<span class="k">INSERT INTO</span> accounts(name,balance) <span class="k">VALUES</span>(<span class="s">'Bob'</span>, <span class="n">10000</span>);
<span class="k">INSERT INTO</span> accounts(name,balance) <span class="k">VALUES</span>(<span class="s">'Alice'</span>, <span class="n">10000</span>);</pre>
          </div>

          <h3>A money-transfer procedure</h3>

          <div class="code-block">
            <div class="code-header"><span>transfer.sql</span><button class="copy-btn">Copy</button></div>
<pre><span class="k">CREATE OR REPLACE PROCEDURE</span> transfer(
   sender <span class="t">int</span>,
   receiver <span class="t">int</span>,
   amount <span class="t">dec</span>
)
<span class="k">LANGUAGE</span> plpgsql
<span class="k">AS</span> $$
<span class="k">BEGIN</span>
   <span class="c">-- subtract from sender</span>
   <span class="k">UPDATE</span> accounts <span class="k">SET</span> balance = balance - amount
   <span class="k">WHERE</span> id = sender;

   <span class="c">-- add to receiver</span>
   <span class="k">UPDATE</span> accounts <span class="k">SET</span> balance = balance + amount
   <span class="k">WHERE</span> id = receiver;

   <span class="k">COMMIT</span>;
<span class="k">END</span>;
$$;

<span class="c">-- call it</span>
<span class="k">CALL</span> transfer(<span class="n">1</span>, <span class="n">2</span>, <span class="n">1000</span>);</pre>
          </div>

          <p>After the call, Bob has $9000 and Alice has $11000. Notice we used <code class="inline">CALL transfer(...)</code> not <code class="inline">SELECT</code>.</p>

          <div class="callout note">
            <span class="callout-label">Function or procedure?</span>
            <p style="margin: 0;">Need to return a value? Function. Doing a multi-step operation that modifies data and may need explicit transaction control? Procedure. A money transfer is the textbook procedure use case — two updates that must both succeed or both fail.</p>
          </div>
        `

  '9': {
    title: 'Triggers, <em>Views</em> & Indexes',
    tag: 'Lab 09 · Reactive DB · Virtual Tables · Performance',
    intro: 'Three big ideas in one lab. Triggers let the database run code automatically when data changes. Views give you a saved query that acts like a virtual table. Indexes make lookups orders of magnitude faster.',
    sections: [
      {
        id: 'triggers',
        num: '01',
        title: 'Triggers — code that runs on database events',
        html: `
          <p>A <strong>trigger</strong> is a piece of code that the database runs automatically whenever a specific event happens on a specific table — an INSERT, UPDATE, or DELETE. You don't call triggers yourself; the database does, every time.</p>

          <h3>What you can do with triggers</h3>
          <ul>
            <li><strong>Audit logging</strong> — record every change to sensitive tables (who, when, what changed)</li>
            <li><strong>Validation</strong> — reject bad data before it gets in (e.g. usernames must be ≥ 8 chars)</li>
            <li><strong>Derived data</strong> — keep a "total_payments" column in sync when payments are inserted</li>
            <li><strong>Notifications</strong> — fire off a message when stock goes below a threshold</li>
          </ul>

          <h3>Two pieces: function + binding</h3>
          <p>In PostgreSQL, a trigger is built in two steps. First you write a special kind of function that returns <code class="inline">TRIGGER</code>. Then you bind that function to a table with <code class="inline">CREATE TRIGGER</code>.</p>

          <div class="code-block">
            <div class="code-header"><span>Step 1 — the trigger function</span><button class="copy-btn">Copy</button></div>
<pre><span class="k">CREATE FUNCTION</span> log_last_name_changes()
<span class="k">RETURNS TRIGGER</span>
<span class="k">LANGUAGE</span> plpgsql
<span class="k">AS</span> $$
<span class="k">BEGIN</span>
   <span class="k">IF NEW</span>.last_name &lt;&gt; <span class="k">OLD</span>.last_name <span class="k">THEN</span>
      <span class="k">INSERT INTO</span> employee_audits(employee_id, last_name, changed_on)
      <span class="k">VALUES</span>(<span class="k">OLD</span>.id, <span class="k">OLD</span>.last_name, <span class="k">now</span>());
   <span class="k">END IF</span>;
   <span class="k">RETURN NEW</span>;
<span class="k">END</span>;
$$;</pre>
          </div>

          <p>Two special variables only available inside trigger functions:</p>
          <ul>
            <li><code class="inline">OLD</code> — the row <em>before</em> the change (NULL on INSERT)</li>
            <li><code class="inline">NEW</code> — the row <em>after</em> the change (NULL on DELETE)</li>
          </ul>

          <div class="code-block">
            <div class="code-header"><span>Step 2 — bind to the table</span><button class="copy-btn">Copy</button></div>
<pre><span class="k">CREATE TRIGGER</span> last_name_changes
   <span class="k">BEFORE UPDATE ON</span> employees
   <span class="k">FOR EACH ROW</span>
   <span class="k">EXECUTE PROCEDURE</span> log_last_name_changes();</pre>
          </div>

          <p>Decoding the binding:</p>
          <ul>
            <li><code class="inline">BEFORE UPDATE</code> — fire <em>before</em> the UPDATE actually happens (you could also use <code class="inline">AFTER</code>). Use BEFORE if you want to validate or modify the row; AFTER if you just want to log.</li>
            <li><code class="inline">ON employees</code> — which table to watch</li>
            <li><code class="inline">FOR EACH ROW</code> — fire once per row affected. The alternative is <code class="inline">FOR EACH STATEMENT</code>, which fires once per query regardless of row count.</li>
            <li><code class="inline">EXECUTE PROCEDURE</code> — call the function we made in step 1</li>
          </ul>

          <h3>Validation trigger example</h3>

          <div class="code-block">
            <div class="code-header"><span>Reject short usernames</span></div>
<pre><span class="k">CREATE FUNCTION</span> check_staff_user()
<span class="k">RETURNS TRIGGER AS</span> $$
<span class="k">BEGIN</span>
   <span class="k">IF LENGTH</span>(<span class="k">NEW</span>.username) &lt; <span class="n">8</span> <span class="k">OR NEW</span>.username <span class="k">IS NULL THEN</span>
      <span class="k">RAISE EXCEPTION</span> <span class="s">'The username cannot be less than 8 characters'</span>;
   <span class="k">END IF</span>;
   <span class="k">RETURN NEW</span>;
<span class="k">END</span>;
$$ <span class="k">LANGUAGE</span> plpgsql;

<span class="k">CREATE TRIGGER</span> username_check
   <span class="k">BEFORE INSERT OR UPDATE ON</span> staff
   <span class="k">FOR EACH ROW</span>
   <span class="k">EXECUTE PROCEDURE</span> check_staff_user();</pre>
          </div>

          <p>Now any attempt to insert or update a staff row with a username under 8 characters will raise an exception and reject the change. The application doesn't need to remember to validate — the database enforces it.</p>

          <div class="callout warn">
            <span class="callout-label">Triggers fire whether you want them or not</span>
            <p style="margin: 0;">Once a trigger is on a table, it fires on <em>every</em> matching operation — including ones from scripts, bulk imports, or other developers' code. Triggers are powerful but can be confusing to debug. To remove one: <code class="inline">DROP TRIGGER username_check ON staff;</code></p>
          </div>

          <div class="playground">
            <div class="playground-header"><span>Trigger simulator — try to break it</span></div>
            <div class="playground-body">
              <p style="margin: 0 0 12px 0; font-size: 0.9rem;">A trigger requires usernames to be ≥ 8 chars and not NULL. Try inserting different values and see what the trigger does.</p>
              <div class="playground-controls">
                <div class="control-group">
                  <label>Try to insert username</label>
                  <input type="text" id="sim6_user" value="bob">
                </div>
                <button class="run-btn" onclick="runSim6()">INSERT</button>
              </div>
              <div class="output-display" id="sim6_out">Output appears here.</div>
            </div>
          </div>
        `
      },
      {
        id: 'views',
        num: '02',
        title: 'Views — saved queries that act like tables',
        html: `
          <p>A <strong>view</strong> is a stored SELECT query. After creating it, you can <code class="inline">SELECT</code> from the view as if it were a real table — but it's actually running the underlying query every time. No data is duplicated.</p>

          <h3>Why views exist</h3>
          <ul>
            <li><strong>Hide complexity</strong> — write one complex JOIN once, then call it by name forever</li>
            <li><strong>Security</strong> — let users see only the columns and rows they're allowed to (e.g. customers in their region only)</li>
            <li><strong>Stability</strong> — if the underlying tables change shape, you update the view definition once; everyone querying the view keeps working</li>
          </ul>

          <h3>Creating a view</h3>

          <div class="code-block">
            <div class="code-header"><span>customer_master view</span><button class="copy-btn">Copy</button></div>
<pre><span class="k">CREATE VIEW</span> customer_master <span class="k">AS</span>
<span class="k">SELECT</span>
   cu.customer_id <span class="k">AS</span> id,
   cu.first_name || <span class="s">' '</span> || cu.last_name <span class="k">AS</span> name,
   a.address,
   a.postal_code <span class="k">AS</span> <span class="s">"zip code"</span>,
   a.phone,
   city.city,
   country.country,
   <span class="k">CASE WHEN</span> cu.activebool <span class="k">THEN</span> <span class="s">'active'</span> <span class="k">ELSE</span> <span class="s">''</span> <span class="k">END AS</span> notes,
   cu.store_id <span class="k">AS</span> sid
<span class="k">FROM</span> customer cu
<span class="k">INNER JOIN</span> address a <span class="k">USING</span> (address_id)
<span class="k">INNER JOIN</span> city <span class="k">USING</span> (city_id)
<span class="k">INNER JOIN</span> country <span class="k">USING</span> (country_id);</pre>
          </div>

          <p>Now you can query it like a table:</p>

          <div class="code-block">
            <div class="code-header"><span>Using the view</span></div>
<pre><span class="k">SELECT</span> id, name, city, country
<span class="k">FROM</span> customer_master
<span class="k">WHERE</span> country = <span class="s">'Pakistan'</span>;</pre>
          </div>

          <p>Behind the scenes, PostgreSQL re-runs the 4-table JOIN every time. But your code stays clean.</p>

          <h3>Modifying through views</h3>
          <p>Simple views (no aggregates, no DISTINCT, single table) are <em>updatable</em> — you can INSERT/UPDATE/DELETE through them and the changes flow to the underlying table.</p>

          <div class="code-block">
            <div class="code-header"><span>usa_cities view + delete</span></div>
<pre><span class="k">CREATE VIEW</span> usa_cities <span class="k">AS</span>
<span class="k">SELECT</span> city, country_id <span class="k">FROM</span> city <span class="k">WHERE</span> country_id = <span class="n">103</span>;

<span class="k">DELETE FROM</span> usa_cities <span class="k">WHERE</span> city = <span class="s">'San Jose'</span>;
<span class="c">-- This actually deletes from the underlying city table.</span></pre>
          </div>

          <div class="callout">
            <span class="callout-label">View vs Materialized View</span>
            <p style="margin: 0;">A regular view re-runs its query every time. A <strong>materialized view</strong> (created with <code class="inline">CREATE MATERIALIZED VIEW</code>) actually stores the result on disk like a snapshot. Faster reads but stale data until you <code class="inline">REFRESH</code> it. Use materialized views for expensive queries on data that doesn't change often.</p>
          </div>
        `

      {
        id: 'indexes',
        num: '03',
        title: 'Indexes — making lookups fast',
        html: `
          <p>An <strong>index</strong> is a separate data structure (usually a B-tree) that the database maintains to speed up lookups on specific columns. Without an index, PostgreSQL has to scan the whole table to find rows matching your WHERE clause. With one, it jumps straight to the right place.</p>

          <div class="callout note">
            <span class="callout-label">Phonebook analogy</span>
            <p style="margin: 0;">Looking up John Doe in an alphabetically-ordered phonebook takes seconds — flip to D, then scan a few names. In an unsorted phonebook, you'd have to check every entry. That's the difference between an indexed and unindexed column.</p>
          </div>

          <h3>The cost of indexes</h3>
          <p>Indexes aren't free:</p>
          <ul>
            <li>They take extra disk space</li>
            <li>Every INSERT, UPDATE, or DELETE has to also update the index</li>
            <li>So they make writes <em>slower</em> while making reads faster</li>
          </ul>
          <p>Rule of thumb: index columns you frequently filter or join on. Don't index every column "just in case."</p>

          <h3>Creating an index — example</h3>

          <p>Without an index, finding an address by phone number scans the whole table:</p>

          <div class="code-block">
            <div class="code-header"><span>The slow way</span></div>
<pre><span class="k">EXPLAIN SELECT</span> * <span class="k">FROM</span> address
<span class="k">WHERE</span> phone = <span class="s">'223664661973'</span>;

<span class="c">-- QUERY PLAN
-- Seq Scan on address  (cost=0.00..15.54 rows=1 width=61)
--   Filter: ((phone)::text = '223664661973'::text)</span></pre>
          </div>

          <p>"Seq Scan" = sequential scan = reading every row. Now add an index:</p>

          <div class="code-block">
            <div class="code-header"><span>Creating the index</span><button class="copy-btn">Copy</button></div>
<pre><span class="k">CREATE INDEX</span> idx_address_phone <span class="k">ON</span> address(phone);</pre>
          </div>

          <div class="code-block">
            <div class="code-header"><span>The fast way</span></div>
<pre><span class="k">EXPLAIN SELECT</span> * <span class="k">FROM</span> address
<span class="k">WHERE</span> phone = <span class="s">'223664661973'</span>;

<span class="c">-- QUERY PLAN
-- Index Scan using idx_address_phone on address
--   (cost=0.28..8.29 rows=1 width=61)
--   Index Cond: ((phone)::text = '223664661973'::text)</span></pre>
          </div>

          <p>"Index Scan" = PostgreSQL is using the index. On a million-row table, this is the difference between seconds and milliseconds.</p>

          <h3>Index types in PostgreSQL</h3>

          <table class="cmp">
            <thead><tr><th>Type</th><th>Best for</th></tr></thead>
            <tbody>
              <tr><td><strong>B-tree</strong> (default)</td><td>Equality and range queries on most types. The one you'll use 95% of the time.</td></tr>
              <tr><td><strong>Hash</strong></td><td>Equality-only lookups. Faster than B-tree for that, but no range support.</td></tr>
              <tr><td><strong>GiST / SP-GiST</strong></td><td>Geometric data, full-text search, ranges</td></tr>
              <tr><td><strong>GIN</strong></td><td>Arrays, JSONB, full-text — columns where each row has many values</td></tr>
              <tr><td><strong>BRIN</strong></td><td>Very large tables where rows are physically ordered by the indexed column (e.g. timestamp logs)</td></tr>
            </tbody>
          </table>

          <h3>UNIQUE indexes</h3>
          <p>Add the <code class="inline">UNIQUE</code> keyword to enforce no duplicates:</p>

          <div class="code-block">
<pre><span class="k">CREATE UNIQUE INDEX</span> idx_employees_mobile_phone
<span class="k">ON</span> employees(mobile_phone);</pre>
          </div>

          <p>Now if anyone tries to insert a row with a phone number that already exists, PostgreSQL rejects it. PRIMARY KEY and UNIQUE constraints automatically create unique indexes behind the scenes.</p>

          <div class="quiz" data-correct="2">
            <div class="quiz-question">You have a logs table that gets 10,000 inserts per minute. You almost never query it. Should you add an index on the <code class="inline">user_id</code> column?</div>
            <ul class="quiz-options">
              <li class="quiz-option" data-idx="0">Yes — indexes always help</li>
              <li class="quiz-option" data-idx="1">Yes — make it UNIQUE for safety</li>
              <li class="quiz-option" data-idx="2">No — the index update cost would slow every insert and reads are rare</li>
              <li class="quiz-option" data-idx="3">Only if the table has under 1000 rows</li>
            </ul>
            <div class="quiz-feedback"></div>
          </div>

          <div class="quiz" data-correct="1">
            <div class="quiz-question">A view differs from a table because…</div>
            <ul class="quiz-options">
              <li class="quiz-option" data-idx="0">Views can't be queried with SELECT</li>
              <li class="quiz-option" data-idx="1">Views don't store data — they re-run the query each time</li>
              <li class="quiz-option" data-idx="2">Views are always read-only</li>
              <li class="quiz-option" data-idx="3">Views require a separate database</li>
            </ul>
            <div class="quiz-feedback"></div>
          </div>

          <div class="completion">
            <h3>✦ Lab 9 complete</h3>
            <p>You can now make the database react automatically (triggers), expose complex queries as virtual tables (views), and tune performance (indexes). Next: stepping outside the SQL world entirely and comparing with MongoDB.</p>
            <button class="next-btn" onclick="loadLab('10')">Continue to Lab 10 →</button>
          </div>
        `
      }
    ]

              <tr><td>Product catalogs</td><td><strong>MongoDB</strong></td><td>Different product types have wildly different attributes (a book vs a TV)</td></tr>
              <tr><td>Real-time analytics</td><td><strong>MongoDB</strong></td><td>Distributed architecture, fast ingestion</td></tr>

              <tr><td>Data model</td><td>Tables (relational)</td><td>Collections of documents</td></tr>

        id: 'mapping',

        title: 'Translating SQL to MongoDB',
        html: `
          <p>The single most useful skill when crossing between worlds: knowing the parallel command. Let's walk every common operation side-by-side.</p>

          <h3>Creating storage</h3>

          <div class="code-block">
            <div class="code-header"><span>SQL</span></div>
<pre><span class="k">CREATE TABLE</span> people (
   id <span class="t">int PRIMARY KEY</span>,
   user_id <span class="t">varchar</span>(<span class="n">30</span>),
   age <span class="t">int</span>,
   status <span class="t">char</span>(<span class="n">1</span>)
);</pre>
          </div>

          <div class="code-block">
            <div class="code-header"><span>MongoDB</span></div>
<pre><span class="c">// Implicit: collection is created on first insert</span>
db.people.insertOne({ user_id: <span class="s">"abc123"</span>, age: <span class="n">55</span>, status: <span class="s">"A"</span> })

<span class="c">// Or explicit:</span>
db.createCollection(<span class="s">"people"</span>)</pre>
          </div>

          <h3>Inserting</h3>

          <div class="code-block">
            <div class="code-header"><span>SQL</span></div>
<pre><span class="k">INSERT INTO</span> people(user_id, age, status)
<span class="k">VALUES</span>(<span class="s">'bcd001'</span>, <span class="n">45</span>, <span class="s">'A'</span>);</pre>
          </div>

          <div class="code-block">
            <div class="code-header"><span>MongoDB</span></div>
<pre>db.people.insertOne({
   user_id: <span class="s">"bcd001"</span>,
   age: <span class="n">45</span>,
   status: <span class="s">"A"</span>
})

<span class="c">// Multiple at once:</span>
db.people.insertMany([
   { user_id: <span class="s">"a"</span>, age: <span class="n">22</span>, status: <span class="s">"A"</span> },
   { user_id: <span class="s">"b"</span>, age: <span class="n">34</span>, status: <span class="s">"B"</span> }
])</pre>
          </div>

          <h3>Querying</h3>

          <table class="cmp">
            <thead><tr><th>SQL</th><th>MongoDB</th></tr></thead>
            <tbody>
              <tr><td><code class="inline">SELECT * FROM people</code></td><td><code class="inline">db.people.find()</code></td></tr>
              <tr><td><code class="inline">SELECT user_id, status FROM people</code></td><td><code class="inline">db.people.find({}, {user_id:1, status:1, _id:0})</code></td></tr>

              <tr><td><code class="inline">WHERE status != "A"</code></td><td><code class="inline">{status: {$ne: "A"}}</code></td></tr>
              <tr><td><code class="inline">WHERE age &gt; 25</code></td><td><code class="inline">{age: {$gt: 25}}</code></td></tr>
              <tr><td><code class="inline">WHERE user_id LIKE "%bc%"</code></td><td><code class="inline">{user_id: /bc/}</code></td></tr>
              <tr><td><code class="inline">ORDER BY user_id ASC</code></td><td><code class="inline">.sort({user_id: 1})</code></td></tr>
              <tr><td><code class="inline">ORDER BY user_id DESC</code></td><td><code class="inline">.sort({user_id: -1})</code></td></tr>
              <tr><td><code class="inline">SELECT COUNT(*) FROM people</code></td><td><code class="inline">db.people.count()</code></td></tr>
            </tbody>
          </table>

          <h3>Updating & deleting</h3>

          <div class="code-block">
            <div class="code-header"><span>SQL — bulk update</span></div>
<pre><span class="k">UPDATE</span> people <span class="k">SET</span> status = <span class="s">'C'</span>
<span class="k">WHERE</span> age &gt; <span class="n">25</span>;</pre>

<pre>db.people.deleteMany({ status: <span class="s">"D"</span> })
db.people.deleteMany({})  <span class="c">// everything</span></pre>
          </div>
        `

        title: 'Aggregation — GROUP BY vs pipelines',
        html: `
          <p>Both systems can summarise data, but they think about it differently. SQL uses GROUP BY and aggregate functions. MongoDB uses an <strong>aggregation pipeline</strong> — an array of stages that data flows through.</p>

          <table class="cmp">
            <thead><tr><th>SQL term</th><th>MongoDB operator</th></tr></thead>
            <tbody>
              <tr><td>WHERE</td><td><code class="inline">$match</code></td></tr>
              <tr><td>GROUP BY</td><td><code class="inline">$group</code></td></tr>
              <tr><td>HAVING</td><td><code class="inline">$match</code> (after $group)</td></tr>
              <tr><td>ORDER BY</td><td><code class="inline">$sort</code></td></tr>
              <tr><td>SUM()</td><td><code class="inline">$sum</code></td></tr>
              <tr><td>COUNT()</td><td><code class="inline">$sum: 1</code></td></tr>
              <tr><td>JOIN</td><td><code class="inline">$lookup</code></td></tr>
            </tbody>
          </table>

          <h3>Same query, both ways</h3>

          <div class="code-block">
            <div class="code-header"><span>SQL — total spend by customer</span></div>
<pre><span class="k">SELECT</span> cust_id, <span class="k">SUM</span>(price) <span class="k">AS</span> total
<span class="k">FROM</span> orders
<span class="k">GROUP BY</span> cust_id
<span class="k">ORDER BY</span> total <span class="k">DESC</span>;</pre>
          </div>

          <div class="code-block">
            <div class="code-header"><span>MongoDB — same query as a pipeline</span></div>
<pre>db.orders.aggregate([
   {
      $group: {
         _id: <span class="s">"$cust_id"</span>,
         total: { $sum: <span class="s">"$price"</span> }
      }
   },
   { $sort: { total: -<span class="n">1</span> } }
])</pre>
          </div>

          <p>Read the pipeline top-to-bottom like a Unix pipeline: group rows by cust_id and sum their prices, then sort the groups by total descending. Each stage's output is the next stage's input.</p>

              <li class="quiz-option" data-idx="2">{age: {$gt: 25}}</li>
              <li class="quiz-option" data-idx="3">WHERE(age &gt; 25)</li>
            </ul>
            <div class="quiz-feedback"></div>
          </div>

    const li = document.createElement('li');
    li.textContent = s.title;
    li.dataset.id = s.id;
    if (i === 0) li.classList.add('active');
    li.onclick = () => {
      document.getElementById('section_' + s.id).scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    sl.appendChild(li);
  });

  // main content
  const main = document.getElementById('mainContent');
  let html = `
    <div class="lab-header">
      <div class="lab-tag">${lab.tag}</div>
      <h1 class="lab-title">${lab.title}</h1>
      <p class="lab-intro">${lab.intro}</p>
    </div>
  `;

  lab.sections.forEach(s => {
    html += `
      <section class="section" id="section_${s.id}">
        <div class="section-num">§ ${s.num}</div>
        <h2>${s.title}</h2>
        ${s.html}
      </section>
    `;
  });

  main.innerHTML = html;

  // attach handlers
  attachQuizHandlers();
  attachCopyHandlers();
  attachScrollSpy();

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function attachQuizHandlers() {
  document.querySelectorAll('.quiz').forEach(quiz => {
    const correct = parseInt(quiz.dataset.correct);
    const opts = quiz.querySelectorAll('.quiz-option');
    const feedback = quiz.querySelector('.quiz-feedback');

    opts.forEach(opt => {
      opt.onclick = () => {
        if (quiz.dataset.answered) return;
        quiz.dataset.answered = 'true';

        const idx = parseInt(opt.dataset.idx);
        if (idx === correct) {
          opt.classList.add('correct');
          feedback.classList.add('show', 'right');
          feedback.textContent = '✓ Correct. Well done.';
        } else {
          opt.classList.add('wrong');
          opts[correct].classList.add('correct');
          feedback.classList.add('show', 'miss');
          feedback.textContent = '✗ Not quite — the correct answer is highlighted above.';
        }
      };
    });
  });
}

function attachCopyHandlers() {
  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.onclick = () => {
      const pre = btn.closest('.code-block').querySelector('pre');
      const text = pre.innerText;
      navigator.clipboard.writeText(text).then(() => {
        btn.classList.add('copied');
        btn.textContent = 'Copied';
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.textContent = 'Copy';
        }, 1500);
      });
    };
  });
}

function attachScrollSpy() {
  const sections = document.querySelectorAll('.section');
  const items = document.querySelectorAll('#sectionList li');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.id.replace('section_', '');
        items.forEach(it => it.classList.toggle('active', it.dataset.id === id));
      }
    });
  }, { rootMargin: '-30% 0px -60% 0px' });

  sections.forEach(s => observer.observe(s));
}

function updateProgress() {
  const pct = (completedLabs.size / 5) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${completedLabs.size}/5 labs`;
}

// ============= SIMULATORS =============

function runSim1() {
  const count = document.getElementById('sim1_count').value;
  const out = document.getElementById('sim1_out');
  out.innerHTML = `<span class="notice">NOTICE:</span>  The number of films is ${count}\nDO\n<span class="ok">Query returned successfully in 39 msec.</span>`;
  out.classList.add('notice-pulse');
  setTimeout(() => out.classList.remove('notice-pulse'), 600);
}

function runSim2() {
  const len = parseInt(document.getElementById('sim2_len').value);
  const title = document.getElementById('sim2_title').value || 'Untitled';
  const out = document.getElementById('sim2_out');

  let desc;
  if (len > 0 && len <= 50) desc = 'Short';
  else if (len > 50 && len < 120) desc = 'Medium';
  else if (len >= 120) desc = 'Long';
  else desc = 'N/A';

  out.innerHTML = `<span class="c">-- block executes...</span>\n<span class="notice">NOTICE:</span>  The ${title} film is ${desc}.\nDO\n<span class="ok">Query returned successfully in 12 msec.</span>`;
  out.classList.add('notice-pulse');
  setTimeout(() => out.classList.remove('notice-pulse'), 600);
}

function runSim3() {
  const pay = parseFloat(document.getElementById('sim3_pay').value);
  const out = document.getElementById('sim3_out');
  let level;
  if (pay > 200) level = 'Platinum';
  else if (pay > 100) level = 'Gold';
  else level = 'Silver';
  out.innerHTML = `<span class="c">-- searched CASE evaluates top to bottom</span>\n<span class="notice">NOTICE:</span>  Service Level: ${level}\nDO`;
}

function runSim4() {
  const start = parseInt(document.getElementById('sim4_start').value);
  const stop = parseInt(document.getElementById('sim4_stop').value);
  const step = parseInt(document.getElementById('sim4_step').value);
  const out = document.getElementById('sim4_out');

  if (step <= 0) {
    out.innerHTML = `<span class="err">ERROR: step must be positive (you'd create an infinite loop!)</span>`;
    return;
  }

  let lines = [];
  let counter = start;
  let safety = 0;
  while (counter < stop && safety < 50) {
    lines.push(`<span class="notice">NOTICE:</span>  Counter ${counter}`);
    counter += step;
    safety++;
  }
  if (lines.length === 0) {
    lines.push(`<span class="c">-- condition was false at start; loop body never ran</span>`);
  } else if (safety >= 50) {
    lines.push(`<span class="err">(stopped at 50 iterations for safety)</span>`);
  }
  lines.push('DO');
  out.innerHTML = lines.join('\n');
}

function runSim5() {
  const from = parseInt(document.getElementById('sim5_from').value);
  const to = parseInt(document.getElementById('sim5_to').value);
  const out = document.getElementById('sim5_out');

  if (to < from) {
    out.innerHTML = `<span class="err">ERROR: len_to (${to}) is less than len_from (${from}) — empty range</span>\n<span class="row"> get_film_count\n----------------\n              0\n(1 row)</span>`;
    return;
  }

  // simulate ~1000 films uniformly between 30 and 200 min
  const lo = Math.max(30, from);
  const hi = Math.min(200, to);
  const span = Math.max(0, hi - lo);
  const result = Math.round((span / 170) * 1000);

  out.innerHTML = `<span class="c">-- calling get_film_count(${from}, ${to})</span>\n<span class="row"> get_film_count\n----------------\n         ${String(result).padStart(6, ' ')}\n(1 row)</span>`;
}

function runSim6() {
  const username = document.getElementById('sim6_user').value;
  const out = document.getElementById('sim6_out');

  if (!username || username.trim() === '') {
    out.innerHTML = `<span class="c">-- INSERT INTO staff(username) VALUES (NULL);</span>\n<span class="err">ERROR:  The username cannot be less than 8 characters\nCONTEXT:  PL/pgSQL function check_staff_user() line 4 at RAISE</span>`;
    return;
  }
  if (username.length < 8) {
    out.innerHTML = `<span class="c">-- INSERT INTO staff(username) VALUES ('${username}');</span>\n<span class="err">ERROR:  The username cannot be less than 8 characters\nCONTEXT:  PL/pgSQL function check_staff_user() line 4 at RAISE</span>\n<span class="c">-- trigger BLOCKED the insert</span>`;
    return;
  }
  out.innerHTML = `<span class="c">-- INSERT INTO staff(username) VALUES ('${username}');</span>\n<span class="ok">INSERT 0 1</span>\n<span class="c">-- trigger accepted the row, insert succeeded</span>`;
}

// ============= INIT =============

document.querySelectorAll('.lab-btn').forEach(btn => {
  btn.onclick = () => {
    completedLabs.add(currentLab);
    updateProgress();
    loadLab(btn.dataset.lab);
  };
});

// load lab 7 on start
loadLab('7');
updateProgress();

// track completed labs when "next" is clicked (handled by completion buttons)
const origLoadLab = loadLab;
window.loadLab = function(k) {
  if (currentLab !== k) {
    completedLabs.add(currentLab);
    updateProgress();
  }
  origLoadLab(k);
};
