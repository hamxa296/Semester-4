<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access | Student Vault</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav>
        <a href="/" class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            StudentVault
        </a>
    </nav>

    <div class="container">
        <div class="form-card" style="max-width: 400px; padding: 3rem;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div style="background: #f1f5f9; color: #64748b; width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                    <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                </div>
                <h2>Admin Panel</h2>
                <p style="color: var(--text-muted); font-size: 0.875rem;">Authorized access only</p>
            </div>

            {% if error %}
            <div class="alert alert-error" style="text-align: center; margin-bottom: 1.5rem;">
                {{ error }}
            </div>
            {% endif %}

            <form action="/admin" method="POST">
                <div class="form-group">
                    <label>Master Password</label>
                    <input type="password" name="password" placeholder="••••••••" required autofocus>
                </div>
                <button type="submit" class="btn admin-btn" style="width: 100%; height: 44px; font-size: 0.95rem;">Authenticate</button>
            </form>
            
            <a href="/" style="display: block; text-align: center; margin-top: 1.5rem; font-size: 0.8rem; color: var(--text-muted); text-decoration: none;">&larr; Back to Home</a>
        </div>
    </div>
</body>
</html>
