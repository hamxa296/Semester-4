<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student | Student Vault</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav>
        <a href="/" class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            StudentVault
        </a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/students">Directory</a>
            <a href="/add">Add Student</a>
            <a href="/admin">Admin</a>
        </div>
    </nav>

    <div class="container">
        <div class="form-card">
            <h2 style="margin-bottom: 0.5rem; text-align: center;">New Student Registration</h2>
            <p style="text-align: center; color: var(--text-muted); font-size: 0.875rem; margin-bottom: 2rem;">Please fill in the details below to create a new profile.</p>
            
            <form action="/add" method="POST" enctype="multipart/form-data">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="e.g. John Doe" required>
                </div>
                <div class="form-group">
                    <label>Major / Field of Study</label>
                    <input type="text" name="major" placeholder="e.g. Computer Science" required>
                </div>
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" name="age" placeholder="21" required min="1" max="100">
                </div>
                <div class="form-group">
                    <label>Profile Image</label>
                    <input type="file" name="profile_image" accept="image/*" required>
                    <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem;">Supported: JPG, PNG, GIF</p>
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Save Profile</button>
                <a href="/" class="btn btn-secondary" style="width: 100%; margin-top: 0.75rem;">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
